<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shelf Space — paste anything, watch it fill a context window</title>
    <meta
      name="description"
      content="Paste any text and watch it physically stack as books on shelves sized to GPT-5.6, Claude, Gemini, and Kimi K3's real context windows."
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23241a12'/%3E%3Ctext x='32' y='45' font-family='Georgia, serif' font-size='36' font-weight='700' fill='%23d98a3d' text-anchor='middle'%3ES%3C/text%3E%3Crect x='13' y='49' width='38' height='4' rx='2' fill='%234f7a5c'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <main class="app-stage">
      <div id="app" role="presentation"></div>

      <div id="ui">
      <header class="topbar">
        <span class="wordmark">Shelf<span class="wordmark-accent">&nbsp;Space</span></span>
        <button id="mute-toggle" class="icon-btn" type="button" aria-label="Mute shelf sounds" aria-pressed="false">
          <svg id="mute-icon" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M4 9v6h4l5 5V4L8 9H4z"
              fill="currentColor"
            />
            <path
              id="mute-slash"
              d="M16 8.5c1.2 1 1.2 6 0 7"
              stroke="currentColor"
              stroke-width="1.6"
              fill="none"
              stroke-linecap="round"
            />
          </svg>
        </button>
      </header>

      <section class="paste-panel" aria-label="Paste text to stack on the shelves">
        <button
          id="panel-toggle"
          class="panel-toggle"
          type="button"
          aria-expanded="true"
          aria-controls="panel-body"
        >
          <span>Paste text</span>
          <svg width="14" height="14" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.2" fill="none" />
          </svg>
        </button>

        <div id="panel-body" class="panel-body">
          <div class="panel-inner">
            <label class="visually-hidden" for="paste-input">Text to stack onto the shelves</label>
            <textarea
              id="paste-input"
              class="paste-input"
              placeholder="Paste an essay, a whole novel, a flattened repo…"
            ></textarea>

            <div id="drop-zone" class="drop-zone" role="button" tabindex="0" aria-label="Choose or drop a text file">
              <span>Drop a <strong>.txt</strong> file here</span>
              <button id="file-picker" class="file-picker" type="button">Browse files</button>
              <input id="file-input" type="file" accept=".txt,text/plain,text/markdown" hidden />
            </div>
            <p id="input-message" class="input-message" role="status"></p>

            <div class="panel-actions">
              <button id="clear-btn" class="btn btn-ghost" type="button">Clear</button>
              <span id="char-count" class="char-count">0 characters</span>
            </div>

            <ul id="readout" class="readout" aria-live="polite"></ul>
          </div>
        </div>
      </section>

      <aside id="book-inspector" class="book-inspector" hidden aria-label="Selected book source">
        <div class="inspector-heading">
          <div>
            <span id="inspector-kicker" class="inspector-kicker">Selected book</span>
            <h2 id="inspector-title" class="inspector-title">Source slice</h2>
          </div>
          <button id="inspector-close" class="icon-btn inspector-close" type="button" aria-label="Close selected book source">
            <span aria-hidden="true">×</span>
          </button>
        </div>
        <p id="inspector-range" class="inspector-range"></p>
        <pre id="inspector-text" class="inspector-text"></pre>
      </aside>
      </div>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
